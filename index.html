<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Quest 3 WebXR Snapshot + Depth JSON Test</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #111;
      color: #eee;
    }

    #ui {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
    }

    #log {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      max-height: 40vh;
      overflow: auto;
      background: rgba(0, 0, 0, 0.65);
      padding: 10px;
      white-space: pre-wrap;
      font-size: 12px;
      border: 1px solid #444;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <div id="ui">
    <button id="enter-ar">Enter AR</button>
    <button id="take-snapshot" disabled>Take Snapshot</button>
    <button id="download-json" disabled>Download JSON</button>
  </div>

  <canvas id="xr-canvas"></canvas>
  <div id="log">Ready.</div>

  <script type="module" src="./app.js"></script>
</body>
</html>
